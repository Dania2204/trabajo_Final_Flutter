name: opaego

description: Proyecto PAEGO con OpenStreetMap

publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local storage
  sqflite: ^2.3.2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Map
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  location: ^5.0.0

  # Image picking & file handling
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Network / cloud sync
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # UI
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true   # ← CRÍTICO: habilita Icons.xxx en toda la app

  assets:
    - .env
    - assets/images/pae_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/pae_logo.png"
  adaptive_icon_background: "#0F8F7D"
  adaptive_icon_foreground: "assets/images/pae_logo.png"
